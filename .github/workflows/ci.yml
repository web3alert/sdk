name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - src/**
      - test/**
      - scripts/**
      - package.json
      - package-lock.json
      - tsconfig*.json
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - src/**
      - test/**
      - scripts/**
      - package.json
      - package-lock.json
      - tsconfig*.json
      - .github/workflows/ci.yml

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts=false

      - name: Build package
        run: npm run build

      - name: Test package
        run: npm test --if-present

      - name: Verify package
        run: npm run verify:package --if-present

      - name: Inspect package contents
        run: npm pack --dry-run
