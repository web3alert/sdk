name: Publish npm package

on:
  workflow_dispatch:
  push:
    branches:
      - marketplace
    paths:
      - src/**
      - package.json
      - package-lock.json

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.ref_name == 'marketplace'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Bump package version
        run: |
          set -euo pipefail

          message="$(git log -1 --pretty=%B)"
          if printf '%s\n' "$message" | grep -qE '^chore\(release\):'; then
            exit 0
          fi

          bump="patch"
          if printf '%s\n' "$message" | grep -qE '(^[a-zA-Z]+(\([^)]+\))?!:|BREAKING CHANGE:)'; then
            bump="major"
          elif printf '%s\n' "$message" | grep -qE '^feat(\([^)]+\))?:'; then
            bump="minor"
          elif printf '%s\n' "$message" | grep -qE '^(fix|perf)(\([^)]+\))?:'; then
            bump="patch"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "$bump" -m "chore(release): publish sdk v%s [skip ci]"
          git push --follow-tags

      - name: Build package
        run: npm run build --if-present

      - name: Publish package
        run: npm publish --access public
